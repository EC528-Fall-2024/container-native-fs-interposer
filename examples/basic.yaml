kind: Pod
apiVersion: v1
metadata:
  name: basic
spec:
  containers:
    - name: busybox
      image: busybox:latest
      volumeMounts:
      - mountPath: "/data"
        name: demo
      command: [ "sleep", "1000000" ]
  volumes:
    - name: demo
      csi:
        driver: interposer.csi.example.com
        volumeAttributes:
          foo: bar
